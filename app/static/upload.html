<!DOCTYPE html>
<html lang="en">
<meta charset="utf-8" />
<head>
  <title>Open SEG-Y</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #fff;
      color: #000;
    }
    header {
      background: #f0f0f0;
      padding: 0.8em 1.2em;
      font-size: 1.2em;
      border-bottom: 1px solid #ccc;
    }
    #controls {
      padding: 1em;
      display: flex;
      gap: 1em;
      align-items: center;
    }
    input,
    button,
    select {
      font-size: 1em;
      padding: 0.2em 0.4em;
    }
    #status_panel {
      margin: 0 1em 1em;
      padding: 0.85em 1em;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      gap: 0.4em;
      max-width: 780px;
    }
    #stage_badge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 0.18em 0.6em;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #475569;
      font-size: 0.84em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    #status_panel.stage-uploading #stage_badge,
    #status_panel.stage-uploaded #stage_badge,
    #status_panel.stage-ingesting #stage_badge,
    #status_panel.stage-opening #stage_badge {
      border-color: #93c5fd;
      background: #eff6ff;
      color: #1d4ed8;
    }
    #status_panel.stage-ready #stage_badge {
      border-color: #86efac;
      background: #f0fdf4;
      color: #166534;
    }
    #status_panel.stage-failed #stage_badge {
      border-color: #fca5a5;
      background: #fef2f2;
      color: #991b1b;
    }
    #status_summary {
      font-weight: 600;
    }
    #status_detail {
      color: #475569;
      font-size: 0.92em;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <header>Open SEG-Y</header>
  <div id="controls">
    <label>
      SEG-Y file:
      <input type="file" id="upload_segy" accept=".sgy,.segy" />
    </label>
    <label>
      key1_byte:
      <select id="key1_byte">
        <option value="1">TRACE_SEQUENCE_LINE (byte 1)</option>
        <option value="5">TRACE_SEQUENCE_FILE (byte 5)</option>
        <option value="9">FIELD_RECORD (byte 9)</option>
        <option value="13">TRACE_NUMBER (byte 13)</option>
        <option value="21">CDP (byte 21)</option>
        <option value="25">CDP_TRACE (byte 25)</option>
        <option value="29">TRACE_IDENTIFICATION_CODE (byte 29)</option>
        <option value="37">OFFSET (byte 37)</option>
        <option value="71">SCALAR_TO_APPLY_COORDINATES (byte 71)</option>
        <option value="73">X (byte 73)</option>
        <option value="77">Y (byte 77)</option>
        <option value="81">REC_X (byte 81)</option>
        <option value="85">REC_Y (byte 85)</option>
        <option value="89">SRC_X (byte 89)</option>
        <option value="93">SRC_Y (byte 93)</option>
        <option value="115">NS (byte 115)</option>
        <option value="117">DT (byte 117)</option>
        <option value="189">INLINE_3D (byte 189)</option>
        <option value="193">CROSSLINE_3D (byte 193)</option>
        <option value="197">SHOT_POINT (byte 197)</option>
      </select>
    </label>
    <label>
      key2_byte:
      <select id="key2_byte">
        <option value="1">TRACE_SEQUENCE_LINE (byte 1)</option>
        <option value="5">TRACE_SEQUENCE_FILE (byte 5)</option>
        <option value="9">FIELD_RECORD (byte 9)</option>
        <option value="13">TRACE_NUMBER (byte 13)</option>
        <option value="21">CDP (byte 21)</option>
        <option value="25">CDP_TRACE (byte 25)</option>
        <option value="29">TRACE_IDENTIFICATION_CODE (byte 29)</option>
        <option value="37">OFFSET (byte 37)</option>
        <option value="71">SCALAR_TO_APPLY_COORDINATES (byte 71)</option>
        <option value="73">X (byte 73)</option>
        <option value="77">Y (byte 77)</option>
        <option value="81">REC_X (byte 81)</option>
        <option value="85">REC_Y (byte 85)</option>
        <option value="89">SRC_X (byte 89)</option>
        <option value="93">SRC_Y (byte 93)</option>
        <option value="115">NS (byte 115)</option>
        <option value="117">DT (byte 117)</option>
        <option value="189">INLINE_3D (byte 189)</option>
        <option value="193">CROSSLINE_3D (byte 193)</option>
        <option value="197">SHOT_POINT (byte 197)</option>
      </select>
    </label>
    <button id="upload_btn">Open</button>
    <progress id="upload_progress" value="0" max="100" style="width: 200px;"></progress>
    <span id="progress_text">0%</span>
  </div>
  <div id="status_panel" class="stage-idle" role="status" aria-live="polite" aria-atomic="true">
    <span id="stage_badge">idle</span>
    <div id="status_summary">Choose a SEG-Y file to begin.</div>
    <div id="status_detail"></div>
  </div>
  <script>
    const progressBar = document.getElementById('upload_progress');
    const progressText = document.getElementById('progress_text');
    const uploadBtn = document.getElementById('upload_btn');
    const key1Select = document.getElementById('key1_byte');
    const key2Select = document.getElementById('key2_byte');
    const statusPanel = document.getElementById('status_panel');
    const stageBadge = document.getElementById('stage_badge');
    const statusSummary = document.getElementById('status_summary');
    const statusDetail = document.getElementById('status_detail');

    const savedKey1 = localStorage.getItem('last_key1_byte');
    if (savedKey1) key1Select.value = savedKey1;
    const savedKey2 = localStorage.getItem('last_key2_byte');
    if (savedKey2) key2Select.value = savedKey2;

    function setUploadState(stage, summary, detail = '') {
      statusPanel.className = `stage-${stage}`;
      stageBadge.textContent = stage;
      statusSummary.textContent = summary;
      statusDetail.textContent = detail;
    }

    async function readResponseDetail(response) {
      try {
        const contentType = response.headers.get('content-type') || '';
        if (contentType.includes('application/json')) {
          const payload = await response.json();
          if (payload && typeof payload.detail === 'string') {
            return payload.detail;
          }
        }
        return await response.text();
      } catch {
        return '';
      }
    }

    function mapUploadError(message) {
      const text = String(message || '').trim();
      const lower = text.toLowerCase();
      if (!text) {
        return 'The server returned an unexpected error. Check server logs.';
      }
      if (lower.includes('network') || lower.includes('failed to fetch')) {
        return 'Network error while contacting the server. Check the connection and retry.';
      }
      if (lower.includes('uploaded file must have a filename')) {
        return 'Select a SEG-Y file before opening.';
      }
      if (lower.includes('trace store not found')) {
        return 'The selected dataset is not prepared yet. Upload the SEG-Y file and retry.';
      }
      if (lower.includes('unable to archive existing trace store')) {
        return 'The server could not replace the existing TraceStore. Check file permissions and retry.';
      }
      return text;
    }

    const lastName = localStorage.getItem('last_original_name');
    if (lastName) {
      progressText.innerText = `前回のデータ: ${lastName}`;
      setUploadState('idle', `Last dataset: ${lastName}`, 'You can reopen it or upload a new SEG-Y file.');
    } else {
      progressText.innerText = '前回のデータ: ありません';
      setUploadState('idle', 'No previous dataset is stored in this browser.', 'Choose a SEG-Y file to upload and ingest.');
    }

    function handleSuccess(fileId, originalName, key1Byte, key2Byte) {
      setUploadState('ready', 'TraceStore is ready.', 'Opening the viewer...');
      localStorage.setItem('file_id', fileId);
      localStorage.setItem('key1_byte', key1Byte);
      localStorage.setItem('key2_byte', key2Byte);
      localStorage.setItem('last_original_name', originalName);
      localStorage.setItem('last_key1_byte', key1Byte);
      localStorage.setItem('last_key2_byte', key2Byte);
      const params = new URLSearchParams({ file_id: fileId, key1_byte: key1Byte, key2_byte: key2Byte });
      window.setTimeout(() => {
        window.location.href = `/?${params.toString()}`;
      }, 150);
    }

    async function openSegy(originalName, key1Byte, key2Byte) {
      const fd = new FormData();
      fd.append('original_name', originalName);
      fd.append('key1_byte', key1Byte);
      fd.append('key2_byte', key2Byte);
      return fetch('/open_segy', { method: 'POST', body: fd });
    }

    async function uploadSegy(file, key1Byte, key2Byte) {
      return new Promise((resolve) => {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('key1_byte', key1Byte);
        formData.append('key2_byte', key2Byte);
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/upload_segy', true);
        xhr.upload.onloadstart = function () {
          setUploadState('uploading', 'Uploading SEG-Y file...', 'The file is being sent to the server.');
        };
        xhr.upload.onprogress = function (e) {
          if (e.lengthComputable) {
            const percent = (e.loaded / e.total) * 100;
            progressBar.value = percent;
            progressText.innerText = `${percent.toFixed(1)}%`;
            setUploadState('uploading', 'Uploading SEG-Y file...', `${percent.toFixed(1)}% transferred.`);
          }
        };
        xhr.upload.onloadend = function () {
          progressBar.value = 100;
          progressText.innerText = '100.0%';
          setUploadState('uploaded', 'Upload finished.', 'Server-side ingest has started. Building TraceStore...');
          window.setTimeout(() => {
            if (statusPanel.classList.contains('stage-uploaded')) {
              setUploadState('ingesting', 'Building TraceStore...', 'The upload is complete. The server is preparing the dataset now.');
            }
          }, 250);
        };
        xhr.onload = async function () {
          if (xhr.status === 200) {
            const result = JSON.parse(xhr.responseText);
            handleSuccess(result.file_id, file.name, key1Byte, key2Byte);
          } else if (xhr.status === 409) {
            try {
              setUploadState('ingesting', 'Upload finished.', 'An existing TraceStore was detected. Reopening the prepared dataset...');
              const res = await openSegy(file.name, key1Byte, key2Byte);
              if (res.ok) {
                const result = await res.json();
                handleSuccess(result.file_id, file.name, key1Byte, key2Byte);
              } else {
                const text = mapUploadError(await readResponseDetail(res));
                setUploadState('failed', 'Open failed.', text);
              }
            } catch (err) {
              setUploadState('failed', 'Open failed.', mapUploadError(err && err.message));
            }
          } else {
            let detail = xhr.responseText || '';
            try {
              const payload = JSON.parse(xhr.responseText || '{}');
              if (payload && typeof payload.detail === 'string') {
                detail = payload.detail;
              }
            } catch {
              detail = xhr.responseText || '';
            }
            setUploadState('failed', 'Upload failed.', mapUploadError(detail));
          }
          resolve();
        };
        xhr.onerror = function () {
          setUploadState('failed', 'Upload failed.', 'Network error while uploading the file. Check the connection and retry.');
          resolve();
        };
        xhr.send(formData);
      });
    }

    uploadBtn.addEventListener('click', async () => {
      uploadBtn.disabled = true;
      const file = document.getElementById('upload_segy').files[0];
      const key1Byte = key1Select.value;
      const key2Byte = key2Select.value;
      progressBar.value = 0;
      progressText.innerText = '0%';
      try {
        if (file) {
          setUploadState('opening', 'Checking for an existing TraceStore...', 'If a prepared dataset already exists, it will be reopened instead of re-ingested.');
          const res = await openSegy(file.name, key1Byte, key2Byte);
          if (res.ok) {
            const result = await res.json();
            handleSuccess(result.file_id, file.name, key1Byte, key2Byte);
          } else if (res.status === 404) {
            setUploadState('uploading', 'No prepared TraceStore found.', 'Uploading the SEG-Y file now.');
            await uploadSegy(file, key1Byte, key2Byte);
          } else {
            const text = mapUploadError(await readResponseDetail(res));
            setUploadState('failed', 'Open failed.', text);
          }
        } else {
          const savedName = localStorage.getItem('last_original_name');
          if (!savedName) {
            setUploadState('failed', 'No dataset selected.', 'Choose a SEG-Y file to upload, or reopen a previously ingested dataset.');
          } else {
            setUploadState('opening', `Opening ${savedName}...`, 'Loading the prepared TraceStore from the server.');
            const res = await openSegy(savedName, key1Byte, key2Byte);
            if (res.ok) {
              const result = await res.json();
              handleSuccess(result.file_id, savedName, key1Byte, key2Byte);
            } else if (res.status === 404) {
              setUploadState('failed', 'Prepared dataset not found.', 'Choose the SEG-Y file and upload it again to rebuild the TraceStore.');
            } else {
              const text = mapUploadError(await readResponseDetail(res));
              setUploadState('failed', 'Open failed.', text);
            }
          }
        }
      } catch (err) {
        setUploadState('failed', 'Open failed.', mapUploadError(err && err.message));
      } finally {
        uploadBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
