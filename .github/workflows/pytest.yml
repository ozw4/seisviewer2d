name: pytest

on:
  pull_request:
  push:
    branches:
      - develop
      - "develop_*"
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r .devcontainer/requirements-dev.txt

      - name: Run tests
        run: |
          pytest -q
