<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Seismic Wiggle Viewer</title>
  <style>
    :root {
      color-scheme: light;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #fff;
      color: #000;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #f0f0f0;
      padding: 0.8em 1.2em;
      font-size: 1.2em;
      border-bottom: 1px solid #ccc;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .headerLinks {
      display: inline-flex;
      gap: 0.5em;
      align-items: center;
      font-size: 0.8em;
    }

    #mainContent {
      flex: 1;
      display: flex;
      min-height: 0;
      background: #fff;
    }

    #viewerColumn {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #controls {
      padding: 0.5em 1em;
      background: #fafafa;
      border-bottom: 1px solid #ccc;
      display: flex;
      gap: 1em;
      align-items: center;
      flex-wrap: wrap;
      overflow-y: auto;
    }

    input,
    button {
      font-size: 1em;
      padding: 0.2em 0.4em;
      margin-right: 0.5em;
    }

    #plotViewport {
      position: relative;
      flex: 1;
      min-height: 0;
      display: flex;
    }

    #plot {
      flex: 1;
      width: 100%;
      min-height: 0;
    }

    #windowLoadingOverlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: flex-end;
      justify-content: flex-end;
      background: rgba(255, 255, 255, .24);
      pointer-events: none;
      z-index: 30;
    }

    #windowLoadingOverlay.show {
      display: flex;
    }

    .windowLoadingBox {
      display: inline-flex;
      align-items: center;
      gap: .55em;
      padding: .45em .7em;
      border-radius: 8px;
      border: 1px solid rgba(0, 0, 0, .15);
      background: rgba(255, 255, 255, .86);
      color: #222;
      font-size: .86em;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
    }

    .windowLoadingSpinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0, 0, 0, .2);
      border-top-color: #007bff;
      border-radius: 50%;
      animation: windowLoadingSpin .8s linear infinite;
      flex: 0 0 auto;
    }

    @keyframes windowLoadingSpin {
      to {
        transform: rotate(360deg);
      }
    }

    #windowLoadingMessage {
      white-space: nowrap;
      line-height: 1.2;
    }

    #pickModeBtn.active {
      background: #007bff;
      color: #fff;
    }

    .op-status {
      width: 100%;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5em;
      font-size: 0.82em;
    }

    .op-status-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35em;
      padding: 0.18em 0.55em;
      border-radius: 999px;
      border: 1px solid #c9d0db;
      background: #f4f6f9;
      color: #334155;
      max-width: min(40ch, 90vw);
    }

    .op-status-chip .op-label {
      font-weight: 600;
    }

    .op-status-chip .op-value {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .op-status-chip.is-idle {
      border-color: #cbd5e1;
      background: #f8fafc;
      color: #475569;
    }

    .op-status-chip.is-running {
      border-color: #93c5fd;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .op-status-chip.is-success {
      border-color: #86efac;
      background: #f0fdf4;
      color: #166534;
    }

    .op-status-chip.is-error {
      border-color: #fca5a5;
      background: #fef2f2;
      color: #991b1b;
    }

    #opToastHost {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 9500;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5em;
      max-width: min(420px, 92vw);
      pointer-events: none;
    }

    .toast {
      pointer-events: auto;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: #fff;
      color: #111827;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.14);
      min-width: 250px;
      max-width: 100%;
      padding: 0.5em 0.65em;
      font-size: 0.9em;
    }

    .toast-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5em;
      margin-bottom: 0.2em;
    }

    .toast-title {
      font-weight: 700;
    }

    .toast-message {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.3;
    }

    .toast-close {
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 0.08em 0.45em;
      margin: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font-size: 0.95em;
      line-height: 1.2;
    }

    .toast-close:hover,
    .toast-close:focus-visible {
      border-color: currentColor;
      outline: none;
    }

    .toast-info {
      border-color: #93c5fd;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .toast-success {
      border-color: #86efac;
      background: #f0fdf4;
      color: #166534;
    }

    .toast-error {
      border-color: #fca5a5;
      background: #fef2f2;
      color: #991b1b;
    }

    #pipelinePanel {
      width: 320px;
      max-width: 100%;
      border-left: 1px solid #ddd;
      background: #fdfdfd;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .pipeline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75em 1em;
      border-bottom: 1px solid #ddd;
      background: #f7f7f7;
      font-weight: 600;
    }

    .pipeline-header .pipeline-actions {
      display: inline-flex;
      gap: 0.5em;
      align-items: center;
    }

    .pipeline-add {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .pipeline-add button {
      margin-right: 0;
    }

    .pipeline-add-menu {
      position: absolute;
      top: 100%;
      right: 0;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, .08);
      padding: .25em 0;
      margin-top: .3em;
      display: none;
      min-width: 160px;
      z-index: 20;
    }

    .pipeline-add-menu.open {
      display: block;
    }

    .pipeline-add-menu button {
      display: block;
      width: 100%;
      background: transparent;
      border: 0;
      text-align: left;
      padding: .45em 1em;
      font-size: .95em;
      cursor: pointer;
    }

    .pipeline-add-menu button:hover,
    .pipeline-add-menu button:focus {
      background: #eef3ff;
    }

    #pipelineCards {
      flex: 1;
      overflow-y: auto;
      padding: 1em;
      background: #fafafa;
    }

    .pipeline-card {
      border: 1px solid #d2d2d2;
      border-radius: 8px;
      padding: .75em;
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: .5em;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .04);
    }

    .pipeline-card+.pipeline-card {
      margin-top: .75em;
    }

    .pipeline-card.disabled {
      opacity: .6;
    }

    .pipeline-card.inspecting {
      border-color: #4c8bf5;
      box-shadow: 0 0 0 1px rgba(76, 139, 245, .25);
    }

    .pipeline-card.is-dragging {
      opacity: .6;
    }

    .pipeline-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .5em;
    }

    .pipeline-card-title {
      display: inline-flex;
      align-items: center;
      gap: .4em;
      font-weight: 600;
      font-size: .95em;
    }

    .drag-handle {
      cursor: grab;
      color: #666;
      font-size: 1.1em;
      line-height: 1;
      user-select: none;
    }

    .pipeline-card-controls {
      display: flex;
      flex-wrap: wrap;
      gap: .75em;
      font-size: .85em;
    }

    .pipeline-card-controls label {
      display: inline-flex;
      align-items: center;
      gap: .35em;
      cursor: pointer;
    }

    .pipeline-label {
      display: flex;
      flex-direction: column;
      gap: .3em;
      font-size: .85em;
    }

    .pipeline-label-input {
      font-size: .95em;
      padding: .35em .45em;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .pipeline-card button {
      font-size: .85em;
      padding: .35em .6em;
      margin-right: 0;
    }

    .pipeline-empty {
      color: #666;
      font-size: .9em;
      padding: .5em .25em;
      text-align: center;
    }

    .pipeline-inspector {
      border-top: 1px solid #ddd;
      padding: .9em 1em;
      background: #fff;
    }

    .pipeline-inspector.hidden {
      display: none;
    }

    .pipeline-inspector h3 {
      margin: 0 0 .6em 0;
      font-size: 1em;
    }

    .pipeline-inspector form {
      display: flex;
      flex-direction: column;
      gap: .6em;
    }

    .pipeline-inspector label {
      display: flex;
      flex-direction: column;
      gap: .3em;
      font-size: .85em;
    }

    .pipeline-inspector input,
    .pipeline-inspector select {
      font-size: .95em;
      padding: .35em .45em;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .pipeline-inspector-actions {
      display: flex;
      justify-content: flex-end;
      gap: .5em;
      margin-top: .4em;
    }

    /* Pipeline progress overlay */
    #ppOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .25);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #ppOverlay.show {
      display: flex;
    }

    .ppCard {
      min-width: 320px;
      max-width: 90vw;
      background: #fff;
      border: 1px solid #e3e3e3;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .15);
      padding: 16px 18px;
      color: #222;
    }

    .ppTitle {
      font-weight: 700;
      margin-bottom: 8px;
    }

    .ppStatus {
      font-size: .95em;
      color: #444;
      margin: 8px 0 12px;
    }

    .ppBar {
      height: 8px;
      background: #eee;
      border-radius: 9999px;
      overflow: hidden;
    }

    .ppBarInner {
      height: 100%;
      width: 0%;
      background: #4c8bf5;
      transition: width .2s ease;
    }

    .ppActions {
      display: flex;
      justify-content: flex-end;
      gap: .5em;
      margin-top: 10px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <header>
    <span>Seismic Wiggle Viewer</span>
    <div class="headerLinks">
      <a id="batchApplyLink" href="/batch" target="_blank" rel="noopener" onclick="openBatchApplyPage(event)">Batch Apply</a>
      <a href="/upload">Open SEG-Y</a>
    </div>
  </header>
  <input type="hidden" id="file_id" />
  <div id="mainContent">
    <div id="viewerColumn">
      <div id="controls">
        <label for="key1_slider">key1 value:</label>
        <input type="range" id="key1_slider" min="0" max="10000" value="0" step="1" oninput="onKey1Input()"
          onchange="onKey1Change()" />
        <input type="number" id="key1_val_display" value="0" min="0" max="10000" step="1" style="width: 60px;"
          onchange="syncSliderWithInput(); fetchAndPlot()" />
        <button onclick="fetchAndPlot()">Plot</button>
        <button id="pickModeBtn" onclick="togglePickMode()">Pick Mode: OFF</button>
        <select id="layerSelect" onchange="drawSelectedLayer()">
          <option value="raw" selected>raw</option>
        </select>
        <label style="margin-left:8px">Normalization:
          <select id="scalingMode" onchange="onScalingChange()">
            <option value="amax" selected>AMAX</option>
            <option value="tracewise">Tracewise</option>
          </select>
        </label>
        <label style="margin-left:8px">σmax (ms):
          <input id="sigma_ms_max" type="number" value="20" step="1" min="1" style="width:5em"
            oninput="onSigmaChange()">
        </label>
        <label style="margin-left:8px">Pick:
          <select id="pick_method" onchange="onPickMethodChange()">
            <option value="argmax" selected>argmax</option>
            <option value="expectation">expectation</option>
          </select>
        </label>
        <label style="margin-left:8px">Snap:
          <select id="snap_mode" onchange="localStorage.setItem('snap_mode', this.value)">
            <option value="none" selected>none</option>
            <option value="peak">peak ↑</option>
            <option value="trough">trough ↓</option>
            <option value="rise">rise ⇑</option>
          </select>
        </label>
        <label style="margin-left:8px">Subsample:
          <select id="snap_refine" onchange="localStorage.setItem('snap_refine', this.value)">
            <option value="none" selected>none</option>
            <option value="parabolic">parabolic (peak/trough)</option>
            <option value="zc">zero-cross (rise)</option>
          </select>
        </label>
        <label>±ms:
          <input id="snap_ms" type="number" value="4" step="0.5" style="width:4.2em"
            oninput="localStorage.setItem('snap_ms', this.value)">
        </label>
        <label><input type="checkbox" id="showFbPred"
            onchange="localStorage.setItem('showFbPred', this.checked); drawSelectedLayer(renderedStart, renderedEnd)">Show
          FB
          predicted</label>

        <label id="fbpick_model_select_label" style="margin-left:8px; display:none;">FB model:
          <select id="fbpick_model_select" disabled></select>
        </label>

        <button id="predictFbBtn" onclick="predictFromFb()">Predict from FB</button>
        <button type="button" id="export-manual-picks-npz" onclick="exportManualPicksNpz()">Export manual picks (.npz)</button>
        <button type="button" id="import-manual-picks-npz" onclick="triggerManualPicksImportNpz()">Import manual picks (.npz)</button>
        <label style="margin-left:8px">Import mode:
          <select id="manual-picks-import-mode">
            <option value="replace" selected>replace</option>
            <option value="merge">merge</option>
          </select>
        </label>
        <input type="file" id="manual-picks-import-input" accept=".npz" style="display:none" onchange="onManualPicksImportInputChange(event)">
        <label for="gain">Gain:</label>
        <input type="range" id="gain" min="0.1" max="5" step="0.1" value="1" oninput="onGainChange()" />
        <span id="gain_display">1×</span>
        <label style="margin-left:8px">Wiggle threshold:
        <input id="wiggle_density" type="number" min="0.02" max="0.30" step="0.01" value="0.20"
          oninput="onWiggleDensityChange()">
        </label>
        <label for="colormap">Colormap:</label>
        <select id="colormap" onchange="onColormapChange()">
          <option value="Greys">Greys</option>
          <option value="RdBu">RdBu</option>
          <option value="BWR">BWR</option>
          <option value="Cividis">Cividis</option>
          <option value="Jet">Jet</option>
        </select>
        <label><input type="checkbox" id="cmReverse" onchange="onColormapChange()">reverse</label>
        <div id="opStatusLine" class="op-status" role="status" aria-live="polite" aria-atomic="false">
          <span id="op-status-export" class="op-status-chip is-idle">
            <span class="op-label">Export:</span>
            <span class="op-value">idle</span>
          </span>
          <span id="op-status-import" class="op-status-chip is-idle">
            <span class="op-label">Import:</span>
            <span class="op-value">idle</span>
          </span>
          <span id="op-status-predict" class="op-status-chip is-idle">
            <span class="op-label">Predict:</span>
            <span class="op-value">idle</span>
          </span>
        </div>
      </div>
      <div id="plotViewport">
        <div id="plot"></div>
        <div id="windowLoadingOverlay" aria-live="polite" aria-atomic="true">
          <div class="windowLoadingBox">
            <span class="windowLoadingSpinner" aria-hidden="true"></span>
            <span id="windowLoadingMessage">Loading window...</span>
          </div>
        </div>
      </div>
    </div>
    <aside id="pipelinePanel">
      <div class="pipeline-header">
        <span>Pipeline</span>
        <div class="pipeline-actions">
          <button type="button" id="pipelineRunButton">▶ Run</button>
          <div class="pipeline-add">
            <button type="button" id="pipelineAddButton">+ Add Step ▾</button>
            <div class="pipeline-add-menu" id="pipelineAddMenu">
              <button type="button" data-step="bandpass">Bandpass</button>
              <button type="button" data-step="denoise">Denoise</button>
            </div>
          </div>
        </div>
      </div>
      <div id="pipelineCards"></div>
      <div id="pipelineInspector" class="pipeline-inspector hidden">
        <h3 id="pipelineInspectorTitle">Inspector</h3>
        <form id="pipelineInspectorForm">
          <div id="pipelineInspectorFields"></div>
          <div class="pipeline-inspector-actions">
            <button type="button" id="pipelineInspectorClose">Close</button>
            <button type="submit" id="pipelineInspectorSave">Save</button>
          </div>
        </form>
      </div>
    </aside>
  </div>
  <div id="opToastHost" aria-live="polite" aria-atomic="false"></div>
  <script>
    function openBatchApplyPage(event) {
      if (event) event.preventDefault();
      const params = new URLSearchParams(window.location.search || '');
      const fileId = params.get('file_id') || localStorage.getItem('file_id') || '';
      const key1Byte = params.get('key1_byte') || localStorage.getItem('key1_byte') || '';
      const key2Byte = params.get('key2_byte') || localStorage.getItem('key2_byte') || '';
      const target = new URL('/batch', window.location.origin);
      if (fileId) target.searchParams.set('file_id', fileId);
      if (key1Byte) target.searchParams.set('key1_byte', key1Byte);
      if (key2Byte) target.searchParams.set('key2_byte', key2Byte);
      const opened = window.open(target.toString(), '_blank', 'noopener,noreferrer');
      if (opened) opened.opener = null;
    }
  </script>
  <script type="module" src="/static/assets/main.js"></script>
  <script src="/static/api.js"></script>
  <script src="/static/pipeline/events.js"></script>
  <script src="/static/pipeline/progressOverlay.js"></script>
  <script src="/static/pipeline/storage.js"></script>
  <script src="/static/pipeline/state.js"></script>
  <script src="/static/pipeline/render/cards.js"></script>
  <script src="/static/pipeline/render/inspector.js"></script>
  <script src="/static/pipeline/run.js"></script>
  <script src="/static/pipeline/index.js"></script>
  <script src="/static/pipeline_ui.js"></script>
  <script type="module" src="/static/viewer/bootstrap.js"></script>
  <script type="module" src="/static/viewer/seis_heatmap_globals.js"></script>
  <script src="/static/viewer/restyle_only.js"></script>
  <script src="/static/viewer/legacy_globals.js"></script>
  <script src="/static/viewer/picks_ops.js"></script>
  <script src="/static/viewer/window_render.js"></script>
  <script src="/static/viewer/window_fetch.js"></script>
  <script src="/static/viewer/viewer_legacy.js"></script>
  <div id="ppOverlay">
    <div class="ppCard">
      <div class="ppTitle">Pipeline running…</div>
      <div id="ppStatus" class="ppStatus">Preparing…</div>
      <div class="ppBar">
        <div id="ppBarInner" class="ppBarInner"></div>
      </div>
      <div class="ppActions">
        <button id="ppCancelBtn" type="button">Cancel</button>
      </div>
    </div>
  </div>
</body>

</html>
