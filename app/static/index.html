<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Seismic Wiggle Viewer</title>
  <style>
    :root {
      color-scheme: light;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #fff;
      color: #000;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #f0f0f0;
      padding: 0.8em 1.2em;
      font-size: 1.2em;
      border-bottom: 1px solid #ccc;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .headerLinks {
      display: inline-flex;
      gap: 0.5em;
      align-items: center;
      font-size: 0.8em;
    }

    #mainContent {
      flex: 1;
      display: flex;
      min-height: 0;
      background: #fff;
    }

    #viewerColumn {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #controlsPanel {
      --controls-panel-height: 270px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: #fafafa;
      border-bottom: 1px solid #ccc;
    }

    #controlsPanelBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75em;
      padding: 0.55em 1em;
      background: #f3f4f6;
      border-bottom: 1px solid #d1d5db;
    }

    .controls-panel-title {
      font-size: 0.9em;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #374151;
    }

    #controlsPanelToggle {
      margin-right: 0;
      padding: 0.3em 0.7em;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      background: #fff;
      color: #1f2937;
      cursor: pointer;
    }

    #controlsPanelToggle:hover,
    #controlsPanelToggle:focus-visible {
      border-color: #94a3b8;
      outline: none;
    }

    #controlsPanelBody {
      display: flex;
      flex-direction: column;
      min-height: 0;
      height: var(--controls-panel-height);
    }

    #controls {
      flex: 1;
      min-height: 0;
      padding: 0.75em 1em;
      background: #fafafa;
      display: flex;
      gap: 1em;
      align-items: stretch;
      align-content: flex-start;
      flex-wrap: wrap;
      overflow-y: auto;
    }

    #controlsResizeHandle {
      flex: 0 0 auto;
      height: 12px;
      cursor: row-resize;
      border-top: 1px solid #d1d5db;
      background:
        linear-gradient(90deg, transparent 0, transparent calc(50% - 18px), #94a3b8 calc(50% - 18px), #94a3b8 calc(50% - 6px), transparent calc(50% - 6px), transparent calc(50% + 6px), #94a3b8 calc(50% + 6px), #94a3b8 calc(50% + 18px), transparent calc(50% + 18px));
    }

    #controlsPanel.is-collapsed #controlsPanelBody {
      display: none;
    }

    #controlsPanel.is-resizing,
    #controlsPanel.is-resizing * {
      user-select: none;
    }

    .control-section {
      display: flex;
      flex: 1 1 260px;
      min-width: 240px;
      flex-direction: column;
      gap: 0.7em;
      padding: 0.8em 0.9em;
      border: 1px solid #d8dee8;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .control-section-heading {
      margin: 0;
      font-size: 0.78em;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #475569;
    }

    .control-section-picking {
      flex-basis: 360px;
      border-color: #93c5fd;
      background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
    }

    .control-section-picking .control-section-heading {
      color: #1d4ed8;
    }

    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55em 0.75em;
      align-items: center;
    }

    .control-field {
      display: inline-flex;
      align-items: center;
      gap: 0.35em;
      margin: 0;
      font-size: 0.92em;
    }

    .control-input-group {
      display: flex;
      align-items: center;
      gap: 0.6em;
      width: 100%;
    }

    .control-input-group input[type="range"] {
      flex: 1 1 180px;
      min-width: 140px;
    }

    .control-input-group input[type="number"] {
      flex: 0 0 auto;
    }

    .control-button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5em;
      align-items: center;
    }

    .control-button-row button {
      margin-right: 0;
    }

    .control-stack {
      display: flex;
      flex-direction: column;
      gap: 0.35em;
    }

    .control-subgroup {
      display: flex;
      flex-direction: column;
      gap: 0.5em;
      padding: 0.65em 0.7em;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #f8fafc;
    }

    .control-subgroup-title {
      font-size: 0.78em;
      font-weight: 700;
      color: #475569;
    }

    .key1-display {
      font-weight: 600;
      color: #0f172a;
    }

    .control-section-status {
      flex: 0 1 260px;
    }

    .control-section-status .op-status {
      width: auto;
      flex-direction: column;
      align-items: stretch;
    }

    .control-section-status .op-status-chip {
      max-width: none;
      justify-content: space-between;
    }

    @media (max-width: 900px) {
      .control-section {
        min-width: min(100%, 280px);
      }
    }

    @media (max-width: 640px) {
      #controlsPanelBar {
        padding: 0.55em 0.75em;
      }

      #controlsPanelBody {
        height: auto;
      }

      #controls {
        padding: 0.75em;
      }

      .control-section {
        flex-basis: 100%;
        min-width: 0;
      }

      .control-input-group {
        align-items: stretch;
        flex-direction: column;
      }

      #controlsResizeHandle {
        display: none;
      }
    }

    input,
    button {
      font-size: 1em;
      padding: 0.2em 0.4em;
      margin-right: 0.5em;
    }

    #plotViewport {
      position: relative;
      flex: 1;
      min-height: 0;
      display: flex;
    }

    #plot {
      flex: 1;
      width: 100%;
      min-height: 0;
    }

    #windowLoadingOverlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: flex-end;
      justify-content: flex-end;
      background: rgba(255, 255, 255, .24);
      pointer-events: none;
      z-index: 30;
    }

    #windowLoadingOverlay.show {
      display: flex;
    }

    .windowLoadingBox {
      display: inline-flex;
      align-items: center;
      gap: .55em;
      padding: .45em .7em;
      border-radius: 8px;
      border: 1px solid rgba(0, 0, 0, .15);
      background: rgba(255, 255, 255, .86);
      color: #222;
      font-size: .86em;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
    }

    .windowLoadingSpinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0, 0, 0, .2);
      border-top-color: #007bff;
      border-radius: 50%;
      animation: windowLoadingSpin .8s linear infinite;
      flex: 0 0 auto;
    }

    @keyframes windowLoadingSpin {
      to {
        transform: rotate(360deg);
      }
    }

    #windowLoadingMessage {
      white-space: nowrap;
      line-height: 1.2;
    }

    #pickModeBtn.active {
      background: #007bff;
      color: #fff;
    }

    .op-status {
      width: 100%;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5em;
      font-size: 0.82em;
    }

    .op-status-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35em;
      padding: 0.18em 0.55em;
      border-radius: 999px;
      border: 1px solid #c9d0db;
      background: #f4f6f9;
      color: #334155;
      max-width: min(40ch, 90vw);
    }

    .op-status-chip .op-label {
      font-weight: 600;
    }

    .op-status-chip .op-value {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .op-status-chip.is-idle {
      border-color: #cbd5e1;
      background: #f8fafc;
      color: #475569;
    }

    .op-status-chip.is-running {
      border-color: #93c5fd;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .op-status-chip.is-success {
      border-color: #86efac;
      background: #f0fdf4;
      color: #166534;
    }

    .op-status-chip.is-error {
      border-color: #fca5a5;
      background: #fef2f2;
      color: #991b1b;
    }

    .pending-pick-status {
      margin-top: 0.45em;
      font-size: 0.82em;
      color: #92400e;
      min-height: 1.3em;
    }

    .pending-pick-status[hidden] {
      display: none;
    }

    #opToastHost {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 9500;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5em;
      max-width: min(420px, 92vw);
      pointer-events: none;
    }

    .toast {
      pointer-events: auto;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: #fff;
      color: #111827;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.14);
      min-width: 250px;
      max-width: 100%;
      padding: 0.5em 0.65em;
      font-size: 0.9em;
    }

    .toast-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5em;
      margin-bottom: 0.2em;
    }

    .toast-title {
      font-weight: 700;
    }

    .toast-message {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.3;
    }

    .toast-close {
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 0.08em 0.45em;
      margin: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font-size: 0.95em;
      line-height: 1.2;
    }

    .toast-close:hover,
    .toast-close:focus-visible {
      border-color: currentColor;
      outline: none;
    }

    .toast-info {
      border-color: #93c5fd;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .toast-success {
      border-color: #86efac;
      background: #f0fdf4;
      color: #166534;
    }

    .toast-error {
      border-color: #fca5a5;
      background: #fef2f2;
      color: #991b1b;
    }

    #pipelinePanel {
      width: 320px;
      max-width: 100%;
      border-left: 1px solid #ddd;
      background: #fdfdfd;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .pipeline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75em 1em;
      border-bottom: 1px solid #ddd;
      background: #f7f7f7;
      font-weight: 600;
    }

    .pipeline-header .pipeline-actions {
      display: inline-flex;
      gap: 0.5em;
      align-items: center;
    }

    .pipeline-run-status {
      display: flex;
      flex-direction: column;
      gap: 0.35em;
      padding: 0.75em 1em;
      border-bottom: 1px solid #e5e7eb;
      background: #fbfcfe;
    }

    .pipeline-run-status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75em;
      flex-wrap: wrap;
    }

    .pipeline-run-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.18em 0.6em;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      color: #475569;
      font-size: 0.8em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .pipeline-run-status.is-running .pipeline-run-badge,
    .pipeline-run-status.is-cancel-requested .pipeline-run-badge {
      border-color: #93c5fd;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .pipeline-run-status.is-success .pipeline-run-badge {
      border-color: #86efac;
      background: #f0fdf4;
      color: #166534;
    }

    .pipeline-run-status.is-error .pipeline-run-badge,
    .pipeline-run-status.is-cancelled .pipeline-run-badge {
      border-color: #fca5a5;
      background: #fef2f2;
      color: #991b1b;
    }

    .pipeline-run-summary {
      font-size: 0.92em;
      color: #0f172a;
    }

    .pipeline-run-detail {
      font-size: 0.82em;
      color: #475569;
      white-space: pre-wrap;
    }

    .pipeline-run-detail.is-error,
    .pipeline-run-detail.is-cancelled {
      color: #991b1b;
    }

    .pipeline-run-note {
      font-size: 0.78em;
      color: #64748b;
    }

    #pipelineCancelButton[hidden] {
      display: none;
    }

    .pipeline-add {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .pipeline-add button {
      margin-right: 0;
    }

    .pipeline-add-menu {
      position: absolute;
      top: 100%;
      right: 0;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, .08);
      padding: .25em 0;
      margin-top: .3em;
      display: none;
      min-width: 160px;
      z-index: 20;
    }

    .pipeline-add-menu.open {
      display: block;
    }

    .pipeline-add-menu button {
      display: block;
      width: 100%;
      background: transparent;
      border: 0;
      text-align: left;
      padding: .45em 1em;
      font-size: .95em;
      cursor: pointer;
    }

    .pipeline-add-menu button:hover,
    .pipeline-add-menu button:focus {
      background: #eef3ff;
    }

    #pipelineCards {
      flex: 1;
      overflow-y: auto;
      padding: 1em;
      background: #fafafa;
    }

    .pipeline-card {
      border: 1px solid #d2d2d2;
      border-radius: 8px;
      padding: .75em;
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: .5em;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .04);
    }

    .pipeline-card+.pipeline-card {
      margin-top: .75em;
    }

    .pipeline-card.disabled {
      opacity: .6;
    }

    .pipeline-card.inspecting {
      border-color: #4c8bf5;
      box-shadow: 0 0 0 1px rgba(76, 139, 245, .25);
    }

    .pipeline-card.is-dragging {
      opacity: .6;
    }

    .pipeline-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .5em;
    }

    .pipeline-card-title {
      display: inline-flex;
      align-items: center;
      gap: .4em;
      font-weight: 600;
      font-size: .95em;
    }

    .drag-handle {
      cursor: grab;
      color: #666;
      font-size: 1.1em;
      line-height: 1;
      user-select: none;
    }

    .pipeline-card-controls {
      display: flex;
      flex-wrap: wrap;
      gap: .75em;
      font-size: .85em;
    }

    .pipeline-card-controls label {
      display: inline-flex;
      align-items: center;
      gap: .35em;
      cursor: pointer;
    }

    .pipeline-label {
      display: flex;
      flex-direction: column;
      gap: .3em;
      font-size: .85em;
    }

    .pipeline-label-input {
      font-size: .95em;
      padding: .35em .45em;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .pipeline-card button {
      font-size: .85em;
      padding: .35em .6em;
      margin-right: 0;
    }

    .pipeline-empty {
      color: #666;
      font-size: .9em;
      padding: .5em .25em;
      text-align: center;
    }

    .pipeline-inspector {
      border-top: 1px solid #ddd;
      padding: .9em 1em;
      background: #fff;
    }

    .pipeline-inspector.hidden {
      display: none;
    }

    .pipeline-inspector h3 {
      margin: 0 0 .6em 0;
      font-size: 1em;
    }

    .pipeline-inspector form {
      display: flex;
      flex-direction: column;
      gap: .6em;
    }

    .pipeline-inspector label {
      display: flex;
      flex-direction: column;
      gap: .3em;
      font-size: .85em;
    }

    .pipeline-inspector input,
    .pipeline-inspector select {
      font-size: .95em;
      padding: .35em .45em;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .pipeline-inspector-actions {
      display: flex;
      justify-content: flex-end;
      gap: .5em;
      margin-top: .4em;
    }

    /* Pipeline progress overlay */
    #ppOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .25);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #ppOverlay.show {
      display: flex;
    }

    .ppCard {
      min-width: 320px;
      max-width: 90vw;
      background: #fff;
      border: 1px solid #e3e3e3;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .15);
      padding: 16px 18px;
      color: #222;
    }

    .ppTitle {
      font-weight: 700;
      margin-bottom: 8px;
    }

    .ppStatus {
      font-size: .95em;
      color: #444;
      margin: 8px 0 12px;
    }

    .ppBar {
      height: 8px;
      background: #eee;
      border-radius: 9999px;
      overflow: hidden;
    }

    .ppBarInner {
      height: 100%;
      width: 0%;
      background: #4c8bf5;
      transition: width .2s ease;
    }

    .ppActions {
      display: flex;
      justify-content: flex-end;
      gap: .5em;
      margin-top: 10px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <header>
    <span>Seismic Wiggle Viewer</span>
    <div class="headerLinks">
      <a id="batchApplyLink" href="/batch" target="_blank" rel="noopener" onclick="openBatchApplyPage(event)">Batch Apply</a>
      <a href="/upload">Open SEG-Y</a>
    </div>
  </header>
  <input type="hidden" id="file_id" />
  <div id="mainContent">
    <div id="viewerColumn">
      <div id="controlsPanel">
        <div id="controlsPanelBar">
          <span class="controls-panel-title">Controls</span>
          <button type="button" id="controlsPanelToggle" aria-expanded="true" aria-controls="controlsPanelBody">Hide Controls</button>
        </div>
        <div id="controlsPanelBody">
          <div id="controls">
            <section class="control-section control-section-navigation" aria-labelledby="controls-navigation-title">
              <h2 id="controls-navigation-title" class="control-section-heading">Navigation</h2>
              <div class="control-stack">
                <label for="key1_slider" class="control-field">key1 value:
                  <span class="key1-display">section selector</span>
                </label>
                <div class="control-input-group">
                  <input type="range" id="key1_slider" min="0" max="10000" value="0" step="1" oninput="onKey1Input()"
                    onchange="onKey1Change()" />
                  <input type="number" id="key1_val_display" value="0" min="0" max="10000" step="1" style="width: 60px;"
                    onchange="syncSliderWithInput(); fetchAndPlot()" />
                  <button type="button" onclick="fetchAndPlot()">Plot</button>
                </div>
              </div>
            </section>

            <section class="control-section control-section-picking" aria-labelledby="controls-picking-title">
              <h2 id="controls-picking-title" class="control-section-heading">Picking</h2>
              <div class="control-button-row">
                <button id="pickModeBtn" onclick="togglePickMode()">Pick Mode: OFF</button>
              </div>
              <div class="control-row">
                <label class="control-field">Pick method:
                  <select id="pick_method" onchange="onPickMethodChange()">
                    <option value="argmax" selected>argmax</option>
                    <option value="expectation">expectation</option>
                  </select>
                </label>
                <label class="control-field">σmax (ms):
                  <input id="sigma_ms_max" type="number" value="20" step="1" min="1" style="width:5em"
                    oninput="onSigmaChange()">
                </label>
                <label class="control-field">Snap:
                  <select id="snap_mode" onchange="localStorage.setItem('snap_mode', this.value)">
                    <option value="none" selected>none</option>
                    <option value="peak">peak ↑</option>
                    <option value="trough">trough ↓</option>
                    <option value="rise">rise ⇑</option>
                  </select>
                </label>
                <label class="control-field">Subsample:
                  <select id="snap_refine" onchange="localStorage.setItem('snap_refine', this.value)">
                    <option value="none" selected>none</option>
                    <option value="parabolic">parabolic (peak/trough)</option>
                    <option value="zc">zero-cross (rise)</option>
                  </select>
                </label>
                <label class="control-field">±ms:
                  <input id="snap_ms" type="number" value="4" step="0.5" style="width:4.2em"
                    oninput="localStorage.setItem('snap_ms', this.value)">
                </label>
              </div>
              <div class="control-row">
                <label class="control-field"><input type="checkbox" id="showFbPred"
                    onchange="localStorage.setItem('showFbPred', this.checked); drawSelectedLayer(renderedStart, renderedEnd)">Show FB predicted</label>
                <label id="fbpick_model_select_label" class="control-field" style="display:none;">FB model:
                  <select id="fbpick_model_select" disabled></select>
                </label>
                <button id="predictFbBtn" type="button" onclick="predictFromFb()">Predict from FB</button>
              </div>
              <div class="control-subgroup" aria-label="Manual picks import and export">
                <div class="control-subgroup-title">Manual Picks</div>
                <div class="control-button-row">
                  <button type="button" id="manual-picks-undo" onclick="undoManualPickEdit()" disabled>Undo</button>

    function openBatchApplyPage(event) {
      if (event) event.preventDefault();
      const params = new URLSearchParams(window.location.search || '');
      const fileId = params.get('file_id') || localStorage.getItem('file_id') || '';
      const key1Byte = params.get('key1_byte') || localStorage.getItem('key1_byte') || '';
      const key2Byte = params.get('key2_byte') || localStorage.getItem('key2_byte') || '';
      const target = new URL('/batch', window.location.origin);
      if (fileId) target.searchParams.set('file_id', fileId);
      if (key1Byte) target.searchParams.set('key1_byte', key1Byte);
      if (key2Byte) target.searchParams.set('key2_byte', key2Byte);
      const opened = window.open(target.toString(), '_blank', 'noopener,noreferrer');
      if (opened) opened.opener = null;
    }
  </script>

  <script>
    (function initControlsPanel() {
      const STORAGE_OPEN = 'sv.controls_panel.open';
      const STORAGE_HEIGHT = 'sv.controls_panel.height';
      const DEFAULT_HEIGHT = 270;
      const MIN_HEIGHT = 120;
      const MOBILE_BREAKPOINT = 640;

      function clampHeight(nextHeight) {
        const viewportHeight = window.innerHeight || document.documentElement.clientHeight || DEFAULT_HEIGHT;
        const maxHeight = Math.max(MIN_HEIGHT, Math.floor(viewportHeight * 0.6));
        return Math.min(maxHeight, Math.max(MIN_HEIGHT, Math.round(nextHeight)));
      }

      function isMobileLayout() {
        return window.innerWidth <= MOBILE_BREAKPOINT;
      }

      function schedulePlotResize() {
        const plotDiv = document.getElementById('plot');
        if (!plotDiv || typeof window.maybeResizePlot !== 'function') return;
        window.requestAnimationFrame(() => {
          window.maybeResizePlot(plotDiv, true).catch((err) => console.warn('controls panel resize failed', err));
        });
      }

      window.addEventListener('DOMContentLoaded', () => {
        const panel = document.getElementById('controlsPanel');
        const body = document.getElementById('controlsPanelBody');
        const toggle = document.getElementById('controlsPanelToggle');
        const handle = document.getElementById('controlsResizeHandle');
        if (!panel || !body || !toggle || !handle) return;

        let dragging = false;
        let dragStartY = 0;
        let dragStartHeight = DEFAULT_HEIGHT;
        let currentHeight = DEFAULT_HEIGHT;
        let isOpen = true;

        function persistState() {
          try {
            localStorage.setItem(STORAGE_OPEN, isOpen ? 'true' : 'false');
            localStorage.setItem(STORAGE_HEIGHT, String(currentHeight));
          } catch (_) {
          }
        }

        function applyHeight(nextHeight, options) {
          currentHeight = clampHeight(nextHeight);
          if (isMobileLayout()) {
            body.style.removeProperty('height');
          } else {
            body.style.height = currentHeight + 'px';
          }
          if (!options || options.persist !== false) persistState();
        }

        function applyOpenState(nextOpen, options) {
          isOpen = !!nextOpen;
          panel.classList.toggle('is-collapsed', !isOpen);
          toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
          toggle.textContent = isOpen ? 'Hide Controls' : 'Show Controls';
          body.hidden = !isOpen;
          if (isOpen) {
            applyHeight(currentHeight, { persist: false });
          }
          if (!options || options.persist !== false) persistState();
          schedulePlotResize();
        }

        try {
          const storedOpen = localStorage.getItem(STORAGE_OPEN);
          if (storedOpen === 'false') isOpen = false;
          const storedHeight = Number(localStorage.getItem(STORAGE_HEIGHT));
          if (Number.isFinite(storedHeight) && storedHeight > 0) {
            currentHeight = clampHeight(storedHeight);
          }
        } catch (_) {
        }

        applyHeight(currentHeight, { persist: false });
        applyOpenState(isOpen, { persist: false });

        toggle.addEventListener('click', () => {
          applyOpenState(!isOpen);
        });

        handle.addEventListener('pointerdown', (event) => {
          if (!isOpen || isMobileLayout()) return;
          dragging = true;
          dragStartY = event.clientY;
          dragStartHeight = body.getBoundingClientRect().height;
          panel.classList.add('is-resizing');
          handle.setPointerCapture(event.pointerId);
          event.preventDefault();
        });

        handle.addEventListener('pointermove', (event) => {
          if (!dragging) return;
          const deltaY = event.clientY - dragStartY;
          applyHeight(dragStartHeight + deltaY, { persist: false });
          schedulePlotResize();
        });

        function finishDrag(event) {
          if (!dragging) return;
          dragging = false;
          panel.classList.remove('is-resizing');
          if (event && typeof handle.releasePointerCapture === 'function' && handle.hasPointerCapture(event.pointerId)) {
            handle.releasePointerCapture(event.pointerId);
          }
          persistState();
          schedulePlotResize();
        }

        handle.addEventListener('pointerup', finishDrag);
        handle.addEventListener('pointercancel', finishDrag);

        window.addEventListener('resize', () => {
          applyHeight(currentHeight, { persist: false });
          schedulePlotResize();
        });
      });
    })();
  </script>
